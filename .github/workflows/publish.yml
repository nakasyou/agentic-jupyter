name: Publish Package

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Semver release type
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure default branch
        run: |
          if [ "${{ github.ref_name }}" != "${{ github.event.repository.default_branch }}" ]; then
            echo "Releases must run from the default branch."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Bump version
        id: version
        run: |
          npm version "${{ inputs.release_type }}" --no-git-tag-version --prefix packages/cli
          VERSION=$(node -p "require('./packages/cli/package.json').version")
          TAG="v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      - name: Commit release version
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/cli/package.json
          git commit -m "release: ${{ steps.version.outputs.tag }}"
          git tag "${{ steps.version.outputs.tag }}"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        run: npm publish --provenance --access public
        working-directory: packages/cli

      - name: Push release commit and tag
        run: git push origin HEAD:${{ github.ref_name }} --follow-tags

      - name: Create GitHub release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: '${{ steps.version.outputs.tag }}',
              name: '${{ steps.version.outputs.tag }}',
              target_commitish: '${{ steps.commit.outputs.sha }}',
              generate_release_notes: true,
              make_latest: 'true',
            })
